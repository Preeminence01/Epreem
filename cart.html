<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#0E0D0B" />
<link rel="apple-touch-icon" href="icons/icon-180.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>Your Cart — EPREEM</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div id="site-header"></div>

<main>
  <div class="wrap">
    <div class="page-title-band" style="border-bottom:0;">
      <span class="eyebrow">Step 1 of 2</span>
      <h1>Your Cart</h1>
    </div>

    <div class="cart-layout" id="cartLayoutRoot">
      <div>
        <div id="cartItems"></div>
        <div class="empty-state" id="cartEmpty" style="display:none;">
          <div style="font-size:38px;">⛁</div>
          <h3>Your cart is empty</h3>
          <p>Browse the marketplace to find something worth keeping.</p>
          <a href="browse.html" class="btn btn-gold" style="margin-top:18px;">Browse Listings</a>
        </div>
      </div>

      <aside class="summary-box" id="summaryBox">
        <h3>Order Summary</h3>
        <div class="coupon-row">
          <input type="text" placeholder="Coupon code" id="couponInput" />
          <button class="btn btn-line btn-sm" onclick="applyCoupon()">Apply</button>
        </div>
        <div class="summary-row"><span>Subtotal</span><span id="sumSubtotal">$0</span></div>
        <div class="summary-row"><span>Estimated shipping</span><span id="sumShipping">$0</span></div>
        <div class="summary-row"><span>Discount</span><span id="sumDiscount">−$0</span></div>
        <div class="summary-row total"><span>Total</span><b id="sumTotal">$0</b></div>
        <a href="checkout.html" class="btn btn-gold btn-block" style="margin-top:18px;">Proceed to Checkout</a>
        <a href="browse.html" class="btn btn-ghost btn-block" style="margin-top:6px;">Continue Shopping</a>
      </aside>
    </div>
  </div>
</main>

<div id="site-footer"></div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script>
let discount = 0;
let lastItems = [];

async function renderCartPage(){
  if(!Auth.isLoggedIn()){
    document.getElementById('cartItems').innerHTML = '';
    document.getElementById('cartEmpty').style.display = 'block';
    document.getElementById('cartEmpty').innerHTML = `
      <div style="font-size:38px;">⛁</div>
      <h3>Sign in to view your cart</h3>
      <p>Your cart is saved to your EPREEM account.</p>
      <a href="login.html" class="btn btn-gold" style="margin-top:18px;">Sign In</a>`;
    document.getElementById('summaryBox').style.display = 'none';
    document.querySelector('.cart-layout').style.gridTemplateColumns = '1fr';
    return;
  }

  let cart;
  try{ cart = await EpreemAPI.cart.list(); }
  catch(err){ toast('Could not load your cart'); return; }

  const items = cart.items || [];
  lastItems = items;
  const itemsEl = document.getElementById('cartItems');

  if(!items.length){
    itemsEl.innerHTML = '';
    document.getElementById('cartEmpty').style.display = 'block';
    document.getElementById('summaryBox').style.display = 'none';
    document.querySelector('.cart-layout').style.gridTemplateColumns = '1fr';
    return;
  }
  document.getElementById('cartEmpty').style.display = 'none';
  document.getElementById('summaryBox').style.display = 'block';
  document.querySelector('.cart-layout').style.gridTemplateColumns = '';

  itemsEl.innerHTML = items.map(ci => {
    const p = ci.product;
    const img = (p.images && p.images.length) ? p.images[0].url : null;
    return `
    <div class="cart-row">
      <div class="cart-thumb" style="display:flex; align-items:center; justify-content:center; font-size:22px; ${img ? `background-image:url('${img}'); background-size:cover;` : ''}">${img ? '' : '◆'}</div>
      <div>
        <div class="ttl">${p.title}</div>
        <div class="sub">${p.condition || ''}</div>
      </div>
      <div class="qty-control">
        <button type="button" onclick="changeQty(${ci.id},-1)">−</button>
        <input value="${ci.quantity}" readonly />
        <button type="button" onclick="changeQty(${ci.id},1)">+</button>
      </div>
      <div style="font-family:var(--display); color:var(--gold-bright); font-size:16px;">${EpreemUI.money(p.price * ci.quantity)}</div>
      <a class="remove" href="#" onclick="event.preventDefault(); Cart.remove(${ci.id})">Remove</a>
    </div>`;
  }).join('');

  const subtotal = items.reduce((s,ci) => s + (ci.product.price * ci.quantity), 0);
  updateSummary(subtotal);
}

function updateSummary(subtotal){
  const shipping = subtotal > 0 ? 150 : 0;
  const total = Math.max(0, subtotal + shipping - discount);
  document.getElementById('sumSubtotal').textContent = EpreemUI.money(subtotal);
  document.getElementById('sumShipping').textContent = EpreemUI.money(shipping);
  document.getElementById('sumDiscount').textContent = '−' + EpreemUI.money(discount);
  document.getElementById('sumTotal').textContent = EpreemUI.money(total);
  sessionStorage.setItem('epreem_checkout_discount', discount);
}

async function changeQty(itemId, delta){
  const item = lastItems.find(i => i.id === itemId);
  if(!item) return;
  const newQty = Math.max(1, item.quantity + delta);
  try{
    await EpreemAPI.cart.update(itemId, newQty);
    renderCartPage();
  }catch(err){ toast(err.message || 'Could not update quantity'); }
}

async function applyCoupon(){
  const code = document.getElementById('couponInput').value.trim();
  if(!code) return;
  try{
    const res = await EpreemAPI.cart.applyCoupon(code);
    discount = Number(res.discount);
    toast('Coupon applied — ' + EpreemUI.money(discount) + ' off');
    const subtotal = lastItems.reduce((s,ci) => s + (ci.product.price * ci.quantity), 0);
    updateSummary(subtotal);
  }catch(err){
    discount = 0;
    toast(err.message || 'Invalid coupon code');
  }
}

window.renderCartPage = renderCartPage;
window.changeQty = changeQty;
window.applyCoupon = applyCoupon;
document.addEventListener('DOMContentLoaded', renderCartPage);
</script>
</body>
</html>
