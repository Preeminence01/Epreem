<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#0E0D0B" />
<link rel="apple-touch-icon" href="icons/icon-180.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>Reset Password — EPREEM</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div id="site-header"></div>

<main>
  <div class="auth-shell">
    <div class="auth-card">
      <span class="eyebrow">Account recovery</span>
      <h1>Set a new password</h1>
      <p class="sub" id="subText">Choose a new password for your EPREEM account.</p>

      <form id="resetForm" novalidate>
        <div class="field">
          <label for="password">New password</label>
          <input type="password" id="password" required minlength="8" placeholder="••••••••" />
        </div>
        <div class="field">
          <label for="password2">Confirm new password</label>
          <input type="password" id="password2" required minlength="8" placeholder="••••••••" />
        </div>
        <button type="submit" class="btn btn-gold btn-block">Update Password</button>
      </form>

      <p class="auth-foot"><a href="login.html">Back to sign in</a></p>
    </div>
  </div>
</main>

<div id="site-footer"></div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/password-visibility.js?v=1"></script>
<script src="js/app.js"></script>
<script>
  const params = new URLSearchParams(location.search);
  const email = params.get('email');
  const token = params.get('token');

  if(!email || !token){
    document.getElementById('resetForm').style.display = 'none';
    document.getElementById('subText').textContent = 'This reset link is missing information. Request a new one from the sign-in page.';
  }

  document.getElementById('resetForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const password = document.getElementById('password').value;
    const password2 = document.getElementById('password2').value;
    if(password !== password2){ toast('Passwords do not match'); return; }

    try{
      await EpreemAPI.auth.resetPassword(email, token, password);
      toast('Password updated — sign in with your new password');
      setTimeout(() => location.href = 'login.html', 900);
    }catch(err){
      toast(err.message || 'Could not reset password — the link may have expired');
    }
  });
</script>
</body>
</html>
