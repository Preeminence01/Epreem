<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#0E0D0B" />
<link rel="apple-touch-icon" href="icons/icon-180.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>Forgot Password — EPREEM</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div id="site-header"></div>

<main>
  <div class="auth-shell">
    <div class="auth-card">
      <span class="eyebrow">Account recovery</span>
      <h1>Forgot your password?</h1>
      <p class="sub">Enter the email on your account and we'll send a link to reset your password.</p>

      <form id="forgotForm" novalidate>
        <div class="field">
          <label for="email">Email address</label>
          <input type="email" id="email" required placeholder="you@example.com" />
        </div>
        <button type="submit" class="btn btn-gold btn-block">Send Reset Link</button>
      </form>

      <div id="successNote" style="display:none; margin-top:20px; padding:16px; border:1px solid var(--line-soft); border-radius:var(--radius); background:var(--bg-raised); font-size:13px; color:var(--ink-dim);">
        If an account exists for that email, a reset link has been sent. It expires in 60 minutes.
      </div>

      <p class="auth-foot">Remembered it? <a href="login.html">Back to sign in</a></p>
    </div>
  </div>
</main>

<div id="site-footer"></div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script>
  document.getElementById('forgotForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const btn = e.target.querySelector('button[type=submit]');
    btn.disabled = true; btn.textContent = 'Sending…';
    try{
      await EpreemAPI.auth.forgotPassword(email);
    }catch(err){
      // The endpoint intentionally never reveals whether the email exists —
      // show the same generic confirmation regardless of network response.
    }
    document.getElementById('forgotForm').style.display = 'none';
    document.getElementById('successNote').style.display = 'block';
  });
</script>
</body>
</html>
